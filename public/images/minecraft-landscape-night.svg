<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="night-sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f1a2a"/>
      <stop offset="100%" stop-color="#1d2c46"/>
    </linearGradient>
    <linearGradient id="night-ground" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2f5b3b"/>
      <stop offset="100%" stop-color="#1f3d28"/>
    </linearGradient>
  </defs>

  <rect width="800" height="300" fill="url(#night-sky)"/>
  <rect y="300" width="800" height="180" fill="url(#night-ground)"/>

  <circle cx="600" cy="90" r="42" fill="#dfe6ff"/>
  <circle cx="615" cy="85" r="32" fill="#0f1a2a"/>

  <g opacity="0.8">
    <circle cx="80" cy="70" r="3" fill="#e4efff"/>
    <circle cx="150" cy="40" r="2.5" fill="#e4efff"/>
    <circle cx="240" cy="90" r="2.5" fill="#e4efff"/>
    <circle cx="320" cy="55" r="2" fill="#e4efff"/>
    <circle cx="420" cy="85" r="2.5" fill="#e4efff"/>
    <circle cx="520" cy="35" r="2" fill="#e4efff"/>
    <circle cx="700" cy="75" r="2.5" fill="#e4efff"/>
  </g>

  <g shape-rendering="crispEdges">
    <rect x="60" y="250" width="140" height="80" fill="#3d6b3f"/>
    <rect x="200" y="220" width="140" height="110" fill="#35603a"/>
    <rect x="340" y="240" width="160" height="90" fill="#3a6a3d"/>
    <rect x="80" y="330" width="120" height="60" fill="#325734"/>
    <rect x="220" y="330" width="140" height="60" fill="#2f5232"/>
    <rect x="380" y="330" width="170" height="60" fill="#2c4f2f"/>
  </g>

  <g shape-rendering="crispEdges">
    <rect x="140" y="180" width="40" height="40" fill="#6a4a30"/>
    <rect x="140" y="140" width="40" height="40" fill="#3c6a3a"/>
    <rect x="180" y="140" width="40" height="40" fill="#3c6a3a"/>
    <rect x="120" y="140" width="40" height="40" fill="#3c6a3a"/>
  </g>
</svg>
