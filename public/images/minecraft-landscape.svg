<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#90c9ff"/>
      <stop offset="100%" stop-color="#d7f1ff"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7cc35b"/>
      <stop offset="100%" stop-color="#4e8b3a"/>
    </linearGradient>
  </defs>

  <rect width="800" height="300" fill="url(#sky)"/>
  <rect y="300" width="800" height="180" fill="url(#ground)"/>

  <rect x="520" y="60" width="90" height="90" fill="#ffe58a"/>
  <rect x="530" y="70" width="70" height="70" fill="#fff3b8"/>

  <g shape-rendering="crispEdges">
    <rect x="60" y="250" width="140" height="80" fill="#6fb34d"/>
    <rect x="200" y="220" width="140" height="110" fill="#5fa046"/>
    <rect x="340" y="240" width="160" height="90" fill="#6ab24c"/>
    <rect x="80" y="330" width="120" height="60" fill="#5d9440"/>
    <rect x="220" y="330" width="140" height="60" fill="#5b8d3f"/>
    <rect x="380" y="330" width="170" height="60" fill="#588a3c"/>
  </g>

  <g shape-rendering="crispEdges">
    <rect x="140" y="180" width="40" height="40" fill="#7a5a3a"/>
    <rect x="140" y="140" width="40" height="40" fill="#6ea853"/>
    <rect x="180" y="140" width="40" height="40" fill="#6ea853"/>
    <rect x="120" y="140" width="40" height="40" fill="#6ea853"/>
  </g>

  <g shape-rendering="crispEdges" opacity="0.85">
    <rect x="40" y="40" width="16" height="16" fill="#ffffff"/>
    <rect x="56" y="40" width="16" height="16" fill="#ffffff"/>
    <rect x="72" y="40" width="16" height="16" fill="#ffffff"/>
    <rect x="56" y="56" width="16" height="16" fill="#ffffff"/>
    <rect x="72" y="56" width="16" height="16" fill="#ffffff"/>
  </g>
</svg>
